<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PDF Merger</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --danger: #ef4444;
            --sidebar-width: 300px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            color: #333;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
            box-shadow: 4px 0 15px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group { margin-bottom: 20px; }
        .control-label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-outline {
            background: transparent;
            border: 2px dashed #cbd5e1;
            color: #64748b;
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: #f8fafc; }

        .btn-danger-text {
            color: var(--danger);
            background: #fef2f2;
        }
        .btn-danger-text:hover { background: #fee2e2; }

        .btn-merge {
            background-color: #10b981;
            color: white;
            font-size: 16px;
            height: 50px;
            margin-top: auto;
        }
        .btn-merge:hover { background-color: #059669; }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box; /* Fix padding issue */
        }
        input[type="text"]:focus { outline: 2px solid var(--primary); border-color: transparent; }

        /* --- MAIN AREA --- */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        .pdf-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid transparent;
        }

        .pdf-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .card-img-wrapper {
            height: 220px;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .card-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none; /* Let clicks pass to card */
        }

        .card-footer {
            padding: 10px;
            font-size: 11px;
            color: #64748b;
            background: #fff;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- MODAL (Lightbox) --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Fixes left cutoff when zoomed */
            justify-content: flex-start; /* Fixes top cutoff when zoomed */
            overflow: auto; 
            padding: 20px 0;
        }

        .modal-img {
            max-height: 80vh;
            max-width: 100%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: height 0.1s ease-out; /* Use height for real scrollbars */
            margin: auto; /* Keeps image perfectly centered when small */
            flex-shrink: 0;
        }

        .modal-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            position: sticky;
            bottom: 20px;
            z-index: 102;
            left: 50%; /* Keeps controls centered in viewport */
            transform: translateX(-50%);
            width: max-content;
        }

        .modal-btn {
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .modal-btn:hover { background: rgba(0,0,0,0.9); }
        .modal-btn.danger { background: rgba(239, 68, 68, 0.8); border-color: var(--danger); color: white; }
        .modal-btn.danger:hover { background: var(--danger); }

        /* Top Right Controls */
        .top-right-controls {
            position: absolute;
            top: 20px; right: 20px;
            display: flex;
            gap: 10px;
            z-index: 105;
            align-items: center;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .control-icon {
            color: white;
            font-size: 26px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
            background: none;
            border: none;
            padding: 0;
            display: flex;
        }
        .control-icon:hover { opacity: 1; }

        .zoom-level-text {
            color: white;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
            min-width: 45px;
            text-align: center;
        }

        /* Helper Classes */
        .hidden { display: none !important; }
        #fileInput { display: none; }
        
        .empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <span class="material-icons-outlined">layers</span>
            PDF Master
        </div>
        
        <div class="control-group">
            <span class="control-label">1. Upload</span>
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
                <span class="material-icons-outlined">upload_file</span>
                Add PDF Files
            </button>
            <input type="file" id="fileInput" multiple accept="application/pdf" onchange="handleFiles(this.files)">
        </div>

        <div class="control-group">
            <span class="control-label">2. Manage</span>
            <button class="btn btn-danger-text" onclick="resetAll()">
                <span class="material-icons-outlined">delete_sweep</span>
                Reset All Pages
            </button>
        </div>

        <div class="control-group" style="margin-top: auto;">
            <span class="control-label">3. Export</span>
            <input type="text" id="fileNameInput" placeholder="merged-document" value="merged-document">
        </div>

        <button class="btn btn-merge" onclick="mergePdfs()">
            MERGE & DOWNLOAD
        </button>
        
        <div id="status" style="margin-top:10px; font-size: 12px; color:#666; text-align: center;"></div>
    </div>

    <div class="main-content">
        <div id="emptyState" class="empty-state">
            <span class="material-icons-outlined" style="font-size: 64px;">source</span>
            <h2>No pages yet</h2>
            <p>Upload files to start merging.</p>
        </div>

        <div id="grid" class="grid-container">
            </div>
    </div>

    <div id="previewModal" class="modal-overlay">
        <div class="top-right-controls">
            <button class="control-icon" onclick="zoomOut()" title="Zoom Out">
                <span class="material-icons-outlined">remove_circle_outline</span>
            </button>
            <span id="zoomText" class="zoom-level-text">100%</span>
            <button class="control-icon" onclick="zoomIn()" title="Zoom In">
                <span class="material-icons-outlined">add_circle_outline</span>
            </button>
            <span class="material-icons-outlined control-icon" onclick="closeModal()" style="margin-left: 10px; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 10px;" title="Close">close</span>
        </div>
        
        <div class="modal-content" id="modalContent">
            <img id="modalImage" class="modal-img" src="" alt="Page Preview">
            
            <div class="modal-controls">
                <button class="modal-btn" onclick="prevPage()">
                    <span class="material-icons-outlined">arrow_back</span> Prev
                </button>
                
                <button class="modal-btn danger" onclick="deleteCurrentPage()">
                    <span class="material-icons-outlined">delete</span> Delete
                </button>
                
                <button class="modal-btn" onclick="nextPage()">
                    Next <span class="material-icons-outlined">arrow_forward</span>
                </button>
            </div>

            <div id="modalInfo" style="color: white; margin-top: 10px; font-size: 14px; position: sticky; bottom: 0; left: 50%; transform: translateX(-50%);"></div>
        </div>
    </div>

    <script>
        // Setup PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pages = []; // Stores { id, pdfDocProxy, pageIndex, fileName, imgSrc }
        let currentModalIndex = -1;
        let currentZoom = 1; // Tracks current zoom scale

        async function handleFiles(files) {
            const status = document.getElementById('status');
            const emptyState = document.getElementById('emptyState');
            
            if (files.length > 0) emptyState.classList.add('hidden');
            status.textContent = "Processing...";

            for (let file of files) {
                const arrayBuffer = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument(arrayBuffer);
                const pdfDoc = await loadingTask.promise;
                
                // We keep the raw bytes to use with pdf-lib later for high-fidelity merging
                // But for previewing, we use pdf.js
                
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    await renderPage(pdfDoc, i, file.name, arrayBuffer);
                }
            }
            status.textContent = `${pages.length} pages ready.`;
        }

        async function renderPage(pdfDoc, pageNum, fileName, pdfBytes) {
            const page = await pdfDoc.getPage(pageNum);
            
            // UPGRADED: Increased scale from 1.0 to 2.5 for crisp text rendering
            // This creates a much higher resolution canvas
            const viewport = page.getViewport({ scale: 2.5 }); 
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            
            // UPGRADED: Increased JPEG quality from 0.8 to 0.95 to reduce compression artifacts
            const imgUrl = canvas.toDataURL('image/jpeg', 0.95);
            
            const pageData = {
                id: Date.now() + Math.random(),
                pdfBytes: pdfBytes,
                pageIndex: pageNum - 1, // 0-based for pdf-lib
                fileName: fileName,
                imgSrc: imgUrl,
                displayNum: pageNum
            };

            pages.push(pageData);
            createCard(pageData);
        }

        function createCard(pageData) {
            const grid = document.getElementById('grid');
            
            const card = document.createElement('div');
            card.className = 'pdf-card';
            card.id = `card-${pageData.id}`;
            card.onclick = () => openModal(pageData.id); // Click to open modal

            card.innerHTML = `
                <div class="card-img-wrapper">
                    <img src="${pageData.imgSrc}" alt="Page ${pageData.displayNum}">
                </div>
                <div class="card-footer">
                    <span>${pageData.fileName}</span>
                    <span style="font-weight:bold;">#${pageData.displayNum}</span>
                </div>
            `;
            
            grid.appendChild(card);
        }

        // --- MODAL LOGIC ---

        function openModal(id) {
            const modal = document.getElementById('previewModal');
            // Find index of this page in the array
            currentModalIndex = pages.findIndex(p => p.id === id);
            
            if(currentModalIndex !== -1) {
                updateModalContent();
                modal.style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('previewModal').style.display = 'none';
            currentModalIndex = -1;
            resetZoom(); // Only reset zoom when fully closing the preview
        }

        function updateModalContent() {
            if (currentModalIndex < 0 || currentModalIndex >= pages.length) return;
            
            const page = pages[currentModalIndex];
            document.getElementById('modalImage').src = page.imgSrc;
            document.getElementById('modalInfo').innerText = `${page.fileName} - Page ${page.displayNum} (${currentModalIndex + 1}/${pages.length})`;
            applyZoom(); // Maintain current zoom level on next/prev page
        }

        // --- ZOOM LOGIC ---
        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.25, 5); // Max 500%
            applyZoom();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.25, 0.5); // Min 50%
            applyZoom();
        }

        function resetZoom() {
            currentZoom = 1;
            applyZoom();
        }

        function applyZoom() {
            const img = document.getElementById('modalImage');
            const zoomText = document.getElementById('zoomText');
            
            // Modify physical dimensions instead of transform so scrollbars work perfectly
            if (currentZoom === 1) {
                img.style.height = ''; 
                img.style.maxWidth = '100%';
                img.style.maxHeight = ''; // Restore CSS default
            } else {
                img.style.height = `${80 * currentZoom}vh`;
                img.style.maxWidth = 'none'; 
                img.style.maxHeight = 'none'; // FIX: Override CSS max-height so it can grow!
            }
            
            // Ensure legacy transform is disabled
            img.style.transform = 'none';
            
            if(zoomText) zoomText.innerText = Math.round(currentZoom * 100) + '%';
        }

        // Touchpad Pinch-to-Zoom / Mouse Wheel Zoom
        document.getElementById('previewModal').addEventListener('wheel', (e) => {
            // Modern touchpads map "pinch" to a wheel event with the Ctrl key pressed
            if (e.ctrlKey) {
                e.preventDefault(); // Stop entire page from zooming
                if (e.deltaY < 0) {
                    currentZoom = Math.min(currentZoom + 0.1, 5); // Finer increments for trackpad
                } else {
                    currentZoom = Math.max(currentZoom - 0.1, 0.5);
                }
                applyZoom();
            }
        }, { passive: false });

        function nextPage() {
            if (currentModalIndex < pages.length - 1) {
                currentModalIndex++;
                updateModalContent();
            }
        }

        function prevPage() {
            if (currentModalIndex > 0) {
                currentModalIndex--;
                updateModalContent();
            }
        }

        function deleteCurrentPage() {
            if (currentModalIndex === -1) return;

            const pageId = pages[currentModalIndex].id;
            
            // Remove from Array
            pages.splice(currentModalIndex, 1);
            
            // Remove from Grid
            const card = document.getElementById(`card-${pageId}`);
            if (card) card.remove();
            
            // Handle Modal Navigation after deletion
            if (pages.length === 0) {
                closeModal();
                resetAll(); // Trigger empty state
            } else {
                // If we deleted the last item, move back one
                if (currentModalIndex >= pages.length) {
                    currentModalIndex = pages.length - 1;
                }
                updateModalContent();
            }
            
            document.getElementById('status').textContent = `${pages.length} pages remaining.`;
        }

        // --- GLOBAL ACTIONS ---

        function resetAll() {
            pages = [];
            document.getElementById('grid').innerHTML = '';
            document.getElementById('fileInput').value = ''; // Reset file input
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('status').textContent = '';
        }

        async function mergePdfs() {
            if (pages.length === 0) {
                alert("Please add files first.");
                return;
            }

            const status = document.getElementById('status');
            status.textContent = "Merging... Please wait.";

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();

                // Group pages by source file to optimize loading
                // (Optimization: load doc once, copy multiple pages)
                // For simplicity here, we load per page entry, but since bytes are in memory it's fast enough for client-side
                
                for (const p of pages) {
                    const sourcePdf = await PDFLib.PDFDocument.load(p.pdfBytes);
                    const [copiedPage] = await mergedPdf.copyPages(sourcePdf, [p.pageIndex]);
                    mergedPdf.addPage(copiedPage);
                }

                const pdfBytes = await mergedPdf.save();
                
                // Download
                const fileNameInput = document.getElementById('fileNameInput').value || 'merged-document';
                const finalName = fileNameInput.endsWith('.pdf') ? fileNameInput : fileNameInput + '.pdf';
                
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = finalName;
                link.click();

                status.textContent = "Merge Complete!";
            } catch (error) {
                console.error(error);
                alert("An error occurred while merging.");
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
            if (e.key === "ArrowRight") nextPage();
            if (e.key === "ArrowLeft") prevPage();
        });

    </script>
</body>
</html>
